<!doctype html>
<html lang="en" class="theme-dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      id="app-favicon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Drumpad" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="Professional drum pad application with recording capabilities"
    />
    <meta name="theme-color" content="#0f0f23" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="author" content="Jakub Horáček" />
    <meta name="keywords" content="drumpad, drums, music, recording, beats" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Drumpad</title>
    <script>
      ;(function () {
        var isStandalone =
          window.navigator.standalone === true ||
          window.matchMedia('(display-mode: standalone)').matches ||
          window.matchMedia('(display-mode: fullscreen)').matches ||
          window.matchMedia('(display-mode: minimal-ui)').matches
        if (isStandalone) {
          document.documentElement.classList.add('is-standalone-pwa')
          var viewport = document.querySelector('meta[name="viewport"]')
          if (viewport) {
            viewport.setAttribute(
              'content',
              'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover',
            )
          }
          var themeMatch = document.documentElement.className.match(/theme-(\w+)/)
          var themeId = themeMatch ? themeMatch[1] : 'dark'
          var navBg = {
            dark: '#1a1a2e',
            og: '#363636',
            light: '#f8fafc',
            cyber: '#0a0a0a',
            sunset: '#2a1a22',
            ocean: '#0a2a3f',
          }
          var navColor = navBg[themeId] || navBg.dark
          document.documentElement.style.backgroundColor = navColor
          document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px')
          var themeColorMeta = document.querySelector('meta[name="theme-color"]')
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', navColor)
          }
          document.addEventListener('DOMContentLoaded', function () {
            document.body.style.backgroundColor = navColor
          })
        } else {
          var height = window.visualViewport
            ? window.visualViewport.height
            : window.innerHeight
          document.documentElement.style.setProperty('--app-height', height + 'px')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
